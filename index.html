<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'DM Sans', sans-serif; 
    background: #0f172a; 
    color: #e2e8f0;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  button:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
  input { font-family: 'DM Sans', sans-serif; outline: none; }
  input:focus { border-color: #818cf8 !important; }

  .screen { min-height: 100vh; padding: 24px 16px; }
  .container { max-width: 580px; margin: 0 auto; width: 100%; }

  /* HOME */
  .home { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .home-badge { font-size: 12px; letter-spacing: 6px; text-transform: uppercase; color: #818cf8; font-weight: 500; margin-bottom: 12px; }
  .home-title { font-size: 56px; font-weight: 700; font-family: 'Playfair Display', serif; line-height: 1.05; margin-bottom: 4px;
    background: linear-gradient(135deg, #e2e8f0, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .home-sub { font-size: 15px; color: #64748b; margin: 16px 0 44px; line-height: 1.6; }
  .home-stat { color: #94a3b8; }
  .btn-primary { background: #818cf8; color: #0f172a; border: none; padding: 16px 52px; border-radius: 12px; font-size: 18px; font-weight: 700; letter-spacing: 1px; }
  .btn-primary:hover { background: #a5b4fc; }

  /* SETUP */
  .section { background: #1e293b; border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid #334155; }
  .section-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #818cf8; font-weight: 600; display: block; margin-bottom: 12px; }
  .mode-btn { flex: 1; padding: 12px 16px; border-radius: 10px; font-size: 15px; font-weight: 600; }
  .mode-btn.active { border: 2px solid #818cf8; background: rgba(129,140,248,0.15); color: #a5b4fc; }
  .mode-btn.inactive { border: 2px solid #334155; background: #0f172a; color: #94a3b8; }
  .input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 10px 14px; font-size: 15px; width: 100%; }
  .cat-chip { padding: 5px 12px; border-radius: 6px; font-size: 12px; white-space: nowrap; border: 1px solid #334155; background: #0f172a; color: #64748b; }
  .cat-chip.active { border-color: #818cf8; background: rgba(129,140,248,0.15); color: #c7d2fe; }
  .cat-count { opacity: 0.5; }
  .warning-box { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; color: #fbbf24; font-size: 13px; }

  /* PLAY */
  .top-bar { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
  .progress-track { height: 3px; background: #1e293b; border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: #818cf8; border-radius: 2px; transition: width 0.3s ease; }
  .team-turn { font-size: 14px; font-weight: 600; color: #818cf8; letter-spacing: 2px; text-transform: uppercase; text-align: center; margin-bottom: 8px; }
  .q-category { font-size: 13px; font-weight: 600; color: #818cf8; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
  .q-meta { display: flex; gap: 12px; justify-content: center; font-size: 12px; color: #64748b; margin-top: 4px; }
  .timer-num { font-size: 60px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; text-align: center; transition: color 0.3s; }
  .timer-bar { width: 200px; height: 4px; background: #1e293b; border-radius: 2px; margin: 8px auto 0; overflow: hidden; }
  .timer-fill { height: 100%; border-radius: 2px; transition: width 1s linear, background 0.3s; }
  .q-card { background: #1e293b; border-radius: 20px; padding: 32px 28px; border: 1px solid #334155; text-align: center; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .q-text { font-size: 22px; line-height: 1.5; font-family: 'Playfair Display', serif; font-weight: 500; }
  .q-comment { font-size: 12px; color: #64748b; margin-top: 12px; font-style: italic; }
  .answer-reveal { background: rgba(129,140,248,0.08); border-radius: 16px; padding: 20px 24px; border: 1px solid rgba(129,140,248,0.2); text-align: center; animation: fadeIn 0.3s ease; }
  .answer-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #818cf8; margin-bottom: 8px; font-weight: 600; }
  .answer-text { font-size: 26px; font-weight: 700; font-family: 'Playfair Display', serif; }
  .btn-correct { flex: 1; padding: 14px 20px; border-radius: 12px; background: rgba(34,197,94,0.12); border: 2px solid #22c55e; color: #22c55e; font-size: 16px; font-weight: 700; max-width: 180px; }
  .btn-incorrect { flex: 1; padding: 14px 20px; border-radius: 12px; background: rgba(239,68,68,0.12); border: 2px solid #ef4444; color: #ef4444; font-size: 16px; font-weight: 700; max-width: 180px; }
  .btn-void { flex: 1; padding: 14px 20px; border-radius: 12px; background: rgba(245,158,11,0.08); border: 2px solid #475569; color: #94a3b8; font-size: 15px; font-weight: 600; max-width: 180px; }
  .streak-badge { margin-top: 16px; font-size: 13px; color: #f59e0b; font-weight: 600; letter-spacing: 1px; text-align: center; }
  .score-active { font-weight: 700; color: #a5b4fc; }
  .score-dim { font-weight: 400; color: #64748b; }

  /* SUMMARY */
  .summary-badge { font-size: 11px; letter-spacing: 6px; text-transform: uppercase; color: #818cf8; text-align: center; }
  .summary-title { font-size: 36px; font-weight: 700; font-family: 'Playfair Display', serif; text-align: center; margin: 8px 0 32px; }
  .score-card { background: #1e293b; border-radius: 16px; padding: 24px; margin-bottom: 12px; border: 1px solid #334155; }
  .score-card.winner { background: rgba(129,140,248,0.1); border: 2px solid #818cf8; }
  .stats-row { display: flex; gap: 16px; font-size: 13px; color: #94a3b8; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

class TriviaApp {
  constructor() {
    this.el = document.getElementById('app');
    this.screen = 'home';
    this.config = null;
    this.questions = [];
    this.qIndex = 0;
    this.phase = 'ready';
    this.timeLeft = 15;
    this.timerInterval = null;
    this.currentTeam = 0;
    this.scores = [];
    this.correct = [];
    this.incorrect = [];
    this.streak = 0;
    this.bestStreak = 0;
    // Setup state
    this.setupMode = 'solo';
    this.setupTeams = [{name:'Team 1'},{name:'Team 2'}];
    this.setupAllCats = true;
    this.setupSelectedCats = new Set();
    this.setupQCount = 20;
    this.setupTimer = 15;
    this.setupDifficulties = new Set();
    this.setupCatSearch = '';
    this.setupMulligans = 2;
    this.reportFlagged = false;
    this.reports = [];

    // Storage helpers
    this.storageAvailable = this._checkStorage();

    // Load persistent reports
    this.allReports = this._loadFromStorage('trivia_reports', []);

    // Load question sets registry
    // Each set: { id, name, questionCount, categoryCount, addedDate }
    this.questionSets = this._loadFromStorage('trivia_question_sets', [
      { id: 'builtin', name: 'Jeopardy (Built-in)', questionCount: TRIVIA_DATA.q.length, categoryCount: TRIVIA_DATA.c.length, addedDate: null }
    ]);
    this.activeSetId = this._loadFromStorage('trivia_active_set', 'builtin');

    // Load active data
    this._loadActiveDataset();

    this.render();
  }

  _checkStorage() {
    try { localStorage.setItem('_test', '1'); localStorage.removeItem('_test'); return true; }
    catch(e) { return false; }
  }

  _loadFromStorage(key, fallback) {
    if (!this.storageAvailable) return fallback;
    try {
      const val = localStorage.getItem(key);
      return val ? JSON.parse(val) : fallback;
    } catch(e) { return fallback; }
  }

  _saveToStorage(key, value) {
    if (!this.storageAvailable) return false;
    try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch(e) { return false; }
  }

  _loadActiveDataset() {
    if (this.activeSetId === 'builtin') {
      this.data = TRIVIA_DATA;
      this.activeSetName = 'Jeopardy (Built-in)';
      this.hasDifficulty = true;
    } else {
      const stored = this._loadFromStorage('trivia_data_' + this.activeSetId, null);
      if (stored) {
        this.data = stored;
        const setInfo = this.questionSets.find(s => s.id === this.activeSetId);
        this.activeSetName = setInfo ? setInfo.name : 'Unknown Set';
        this.hasDifficulty = stored.hasDifficulty !== false && stored.q.length > 0 && stored.q[0].length > 3;
      } else {
        this.data = TRIVIA_DATA;
        this.activeSetId = 'builtin';
        this.activeSetName = 'Jeopardy (Built-in)';
        this.hasDifficulty = true;
        this._saveToStorage('trivia_active_set', 'builtin');
      }
    }
  }

  _saveReports() {
    this._saveToStorage('trivia_reports', this.allReports);
  }

  _importQuestionSet(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.q || !data.c || !Array.isArray(data.q)) {
          alert('Invalid question set format. Expected JSON with "q" (questions array) and "c" (categories array).');
          return;
        }
        const id = 'set_' + Date.now();
        const name = data.name || file.name.replace(/\.json$/i, '');
        const setInfo = {
          id, name,
          questionCount: data.q.length,
          categoryCount: data.c.length,
          addedDate: new Date().toLocaleDateString()
        };

        // Try to save the data — may fail if too large for localStorage
        const saved = this._saveToStorage('trivia_data_' + id, data);
        if (!saved) {
          alert('This question set is too large to store in your browser (' + (file.size/1024/1024).toFixed(1) + ' MB). Try the smaller 20K version, or clear other imported sets to free space.');
          return;
        }

        // Update registry
        this.questionSets.push(setInfo);
        this._saveToStorage('trivia_question_sets', this.questionSets);

        // Switch to it
        this.activeSetId = id;
        this._saveToStorage('trivia_active_set', id);
        this._loadActiveDataset();
        this.render();
      } catch(err) {
        alert('Error reading file: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  _deleteQuestionSet(id) {
    if (id === 'builtin') return;
    this.questionSets = this.questionSets.filter(s => s.id !== id);
    this._saveToStorage('trivia_question_sets', this.questionSets);
    if (this.storageAvailable) {
      try { localStorage.removeItem('trivia_data_' + id); } catch(e) {}
    }
    if (this.activeSetId === id) {
      this.activeSetId = 'builtin';
      this._saveToStorage('trivia_active_set', 'builtin');
      this._loadActiveDataset();
    }
    this.render();
  }

  _switchQuestionSet(id) {
    this.activeSetId = id;
    this._saveToStorage('trivia_active_set', id);
    this._loadActiveDataset();
    this.render();
  }

  _downloadReports() {
    if (this.allReports.length === 0) return;
    const lines = ['Question\tAnswer\tCategory\tSubcategory\tMarked As\tDate'];
    this.allReports.forEach(rp => {
      lines.push([rp.question, rp.answer, rp.category, rp.subcategory, rp.markedAs, rp.date || ''].join('\t'));
    });
    const blob = new Blob([lines.join('\n')], {type:'text/tab-separated-values'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'flagged_questions.tsv'; a.click();
    URL.revokeObjectURL(url);
  }

  _clearReports() {
    this.allReports = [];
    this._saveReports();
    this.render();
  }

  render() {
    switch(this.screen) {
      case 'home': this.renderHome(); break;
      case 'setup': this.renderSetup(); break;
      case 'play': this.renderPlay(); break;
      case 'summary': this.renderSummary(); break;
    }
  }

  renderHome() {
    const tq = this.data.q.length;
    const tc = this.data.c.length;
    this.el.innerHTML = `
      <div class="screen home">
        <div style="text-align:center;max-width:480px">
          <div class="home-badge">Trivia Engine</div>
          <h1 class="home-title">The Quiz</h1>
          <p class="home-sub">
            <span class="home-stat">${tq.toLocaleString()} questions</span> across <span class="home-stat">${tc.toLocaleString()} categories</span>
            <br><span style="font-size:13px;opacity:0.6">Solo practice &bull; Team play</span>
          </p>
          <button class="btn-primary" id="btn-start">Start Game</button>
        </div>
      </div>`;
    document.getElementById('btn-start').onclick = () => { this.screen = 'setup'; this.render(); };
  }

  renderSetup() {
    const cats = this.data.c;
    const filtered = cats.filter(([n]) => n.toLowerCase().includes(this.setupCatSearch.toLowerCase()));
    const availCount = this.setupAllCats
      ? cats.reduce((s,[,c]) => s+c, 0)
      : cats.filter(([n]) => this.setupSelectedCats.has(n)).reduce((s,[,c]) => s+c, 0);
    const poolWarning = this.setupQCount > availCount;
    const reportCount = this.allReports.length;

    // Question Sets HTML
    const setsHtml = this.questionSets.map(s => {
      const isActive = s.id === this.activeSetId;
      return `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:${isActive ? '2px solid #818cf8' : '1px solid #334155'};background:${isActive ? 'rgba(129,140,248,0.1)' : '#0f172a'};margin-bottom:6px;cursor:pointer" data-set-select="${s.id}">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:${isActive?700:500};color:${isActive?'#a5b4fc':'#94a3b8'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(s.name)}</div>
            <div style="font-size:11px;color:#64748b">${s.questionCount.toLocaleString()} Q &bull; ${s.categoryCount} cats</div>
          </div>
          ${isActive ? '<span style="color:#818cf8;font-size:11px;font-weight:600">ACTIVE</span>' : ''}
          ${s.id !== 'builtin' ? `<button data-set-delete="${s.id}" style="background:none;border:1px solid #475569;border-radius:6px;color:#ef4444;width:26px;height:26px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">&times;</button>` : ''}
        </div>`;
    }).join('');

    let teamsHtml = '';
    if (this.setupMode === 'team') {
      teamsHtml = `<div class="section"><span class="section-label">Teams</span>`;
      this.setupTeams.forEach((t,i) => {
        teamsHtml += `<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
          <input class="input" style="flex:1" value="${escapeHtml(t.name)}" data-team="${i}" placeholder="Team ${i+1}">
          ${this.setupTeams.length > 2 ? `<button style="background:none;border:1px solid #475569;border-radius:8px;color:#ef4444;width:38px;height:38px;font-size:18px;display:flex;align-items:center;justify-content:center" data-remove-team="${i}">&times;</button>` : ''}
        </div>`;
      });
      if (this.setupTeams.length < 6) {
        teamsHtml += `<button id="add-team" style="background:none;border:1px dashed #475569;border-radius:8px;color:#818cf8;padding:10px;width:100%;font-size:14px">+ Add Team</button>`;
      }
      teamsHtml += `</div>`;
    }

    const catChips = filtered.slice(0,100).map(([name,count]) => {
      const sel = this.setupAllCats || this.setupSelectedCats.has(name);
      return `<button class="cat-chip ${sel && !this.setupAllCats ? 'active' : ''}" data-cat="${escapeHtml(name)}">${escapeHtml(name)} <span class="cat-count">(${count})</span></button>`;
    }).join('');

    // Use the dataset-level difficulty flag
    const hasDifficulty = this.hasDifficulty;
    const hasPointValues = hasDifficulty && this.data.q.slice(0, 500).some(q => q.length > 4 && q[4] > 0);

    this.el.innerHTML = `
      <div class="screen" style="background:linear-gradient(135deg,#0f172a,#1e293b)">
        <div class="container">
          <h2 style="text-align:center;font-size:28px;font-weight:700;font-family:'Playfair Display',serif;margin-bottom:32px">Game Setup</h2>

          <div class="section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
              <span class="section-label" style="margin-bottom:0">Question Set</span>
              <label style="background:none;border:1px dashed #818cf8;border-radius:6px;color:#818cf8;padding:4px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">
                + Import
                <input type="file" accept=".json" id="import-set" style="display:none">
              </label>
            </div>
            ${setsHtml}
          </div>

          <div class="section">
            <span class="section-label">Game Mode</span>
            <div style="display:flex;gap:8px">
              <button class="mode-btn ${this.setupMode==='solo'?'active':'inactive'}" data-mode="solo">Solo Practice</button>
              <button class="mode-btn ${this.setupMode==='team'?'active':'inactive'}" data-mode="team">Team Play</button>
            </div>
          </div>

          ${teamsHtml}

          ${hasDifficulty ? `<div class="section">
            <span class="section-label">Difficulty</span>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              <button class="mode-btn ${this.setupDifficulties.size===0?'active':'inactive'}" style="padding:8px 16px;font-size:13px;flex:none" data-diff="all">All</button>
              ${[['0','Easy'],['1','Medium'],['2','Hard'],['3','Final']].map(([v,l]) =>
                `<button class="mode-btn ${this.setupDifficulties.has(v)?'active':'inactive'}" style="padding:8px 16px;font-size:13px;flex:none" data-diff="${v}">${l}</button>`
              ).join('')}
            </div>
          </div>` : ''}

          <div style="display:flex;gap:16px;margin-bottom:16px">
            <div class="section" style="flex:1;margin-bottom:0">
              <span class="section-label">Questions</span>
              <input class="input" type="number" min="5" max="500" value="${this.setupQCount}" id="q-count">
            </div>
            <div class="section" style="flex:1;margin-bottom:0">
              <span class="section-label">Timer (sec)</span>
              <input class="input" type="number" min="5" max="120" value="${this.setupTimer}" id="timer-val">
            </div>
            <div class="section" style="flex:1;margin-bottom:0">
              <span class="section-label">Mulligans</span>
              <input class="input" type="number" min="0" max="20" value="${this.setupMulligans}" id="mulligan-count">
            </div>
          </div>

          <div class="section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
              <span class="section-label" style="margin-bottom:0">Categories</span>
              <button id="all-cats-btn" style="background:${this.setupAllCats?'rgba(129,140,248,0.15)':'none'};border:1px solid ${this.setupAllCats?'#818cf8':'#475569'};border-radius:6px;color:${this.setupAllCats?'#a5b4fc':'#94a3b8'};padding:4px 12px;font-size:12px">All Categories</button>
            </div>
            <input class="input" placeholder="Search categories..." value="${escapeHtml(this.setupCatSearch)}" id="cat-search" style="margin-bottom:12px">
            <div style="max-height:200px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px">
              ${catChips}
            </div>
          </div>

          ${poolWarning ? `<div class="warning-box">Only ${availCount} questions available in selected categories. Game will use ${Math.min(this.setupQCount, availCount)} questions.</div>` : ''}

          ${reportCount > 0 ? `
          <div class="section" style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span style="color:#f59e0b;font-size:13px;font-weight:600">&#9873; ${reportCount} flagged question${reportCount>1?'s':''}</span>
              <div style="font-size:11px;color:#64748b;margin-top:2px">Accumulated across all games</div>
            </div>
            <div style="display:flex;gap:8px">
              <button id="dl-reports" style="background:rgba(245,158,11,0.12);border:1px solid #f59e0b;border-radius:8px;color:#f59e0b;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Download</button>
              <button id="clear-reports" style="background:none;border:1px solid #475569;border-radius:8px;color:#64748b;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">Clear</button>
            </div>
          </div>` : ''}

          <button class="btn-primary" style="width:100%;margin-bottom:32px" id="start-game">Start Game</button>
        </div>
      </div>`;

    // Question set events
    const importInput = document.getElementById('import-set');
    if (importInput) importInput.onchange = (e) => { if (e.target.files[0]) this._importQuestionSet(e.target.files[0]); };
    this.el.querySelectorAll('[data-set-select]').forEach(el => {
      el.onclick = (e) => {
        if (e.target.closest('[data-set-delete]')) return;
        this._switchQuestionSet(el.dataset.setSelect);
        // Reset category selection when switching sets
        this.setupAllCats = true;
        this.setupSelectedCats = new Set();
        this.setupCatSearch = '';
      };
    });
    this.el.querySelectorAll('[data-set-delete]').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); if (confirm('Remove this question set?')) this._deleteQuestionSet(btn.dataset.setDelete); };
    });
    // Report events
    const dlBtn = document.getElementById('dl-reports');
    if (dlBtn) dlBtn.onclick = () => this._downloadReports();
    const clearBtn = document.getElementById('clear-reports');
    if (clearBtn) clearBtn.onclick = () => { if (confirm('Clear all flagged reports?')) this._clearReports(); };

    // Event listeners
    this.el.querySelectorAll('[data-mode]').forEach(btn => {
      btn.onclick = () => { this.setupMode = btn.dataset.mode; this.render(); };
    });
    this.el.querySelectorAll('[data-diff]').forEach(btn => {
      btn.onclick = () => {
        const v = btn.dataset.diff;
        if (v === 'all') {
          this.setupDifficulties = new Set();
        } else {
          if (this.setupDifficulties.has(v)) this.setupDifficulties.delete(v);
          else this.setupDifficulties.add(v);
        }
        this.render();
      };
    });
    this.el.querySelectorAll('[data-cat]').forEach(btn => {
      btn.onclick = () => {
        const name = btn.dataset.cat;
        if (this.setupAllCats) {
          this.setupAllCats = false;
          this.setupSelectedCats = new Set([name]);
        } else {
          if (this.setupSelectedCats.has(name)) this.setupSelectedCats.delete(name);
          else this.setupSelectedCats.add(name);
          if (this.setupSelectedCats.size === 0) this.setupAllCats = true;
        }
        this.render();
      };
    });
    this.el.querySelectorAll('[data-team]').forEach(inp => {
      inp.oninput = () => { this.setupTeams[parseInt(inp.dataset.team)].name = inp.value; };
    });
    this.el.querySelectorAll('[data-remove-team]').forEach(btn => {
      btn.onclick = () => { this.setupTeams.splice(parseInt(btn.dataset.removeTeam), 1); this.render(); };
    });
    const addTeam = document.getElementById('add-team');
    if (addTeam) addTeam.onclick = () => { this.setupTeams.push({name:`Team ${this.setupTeams.length+1}`}); this.render(); };
    const allCatsBtn = document.getElementById('all-cats-btn');
    if (allCatsBtn) allCatsBtn.onclick = () => { this.setupAllCats = true; this.setupSelectedCats.clear(); this.render(); };
    const catSearch = document.getElementById('cat-search');
    if (catSearch) catSearch.oninput = () => { this.setupCatSearch = catSearch.value; this.render(); catSearch.focus(); };
    const qCount = document.getElementById('q-count');
    if (qCount) qCount.oninput = () => { this.setupQCount = Math.max(1, parseInt(qCount.value) || 5); };
    const timerVal = document.getElementById('timer-val');
    if (timerVal) timerVal.oninput = () => { this.setupTimer = Math.max(5, parseInt(timerVal.value) || 15); };
    const mulliganCount = document.getElementById('mulligan-count');
    if (mulliganCount) mulliganCount.oninput = () => { this.setupMulligans = Math.max(0, parseInt(mulliganCount.value) || 0); };

    document.getElementById('start-game').onclick = () => this.startGame(availCount);
  }

  startGame(availCount) {
    const teams = this.setupMode === 'team' ? [...this.setupTeams] : [{name:'You'}];
    let pool = [...this.data.q];

    if (!this.setupAllCats) {
      pool = pool.filter(q => this.setupSelectedCats.has(q[2]));
    }
    if (this.setupDifficulties.size > 0) {
      const diffs = new Set([...this.setupDifficulties].map(Number));
      pool = pool.filter(q => diffs.has(q[3]));
    }

    pool = shuffle(pool);
    const count = Math.min(this.setupQCount, pool.length, availCount);
    this.questions = pool.slice(0, count);
    this.reservePool = pool.slice(count);
    this.config = { mode: this.setupMode, teams, timerLength: this.setupTimer, mulligansPerTeam: this.setupMulligans };
    this.qIndex = 0;
    this.phase = 'timing';
    this.timeLeft = this.setupTimer;
    this.paused = false;
    this.currentTeam = 0;
    this.scores = teams.map(() => 0);
    this.correct = teams.map(() => 0);
    this.incorrect = teams.map(() => 0);
    this.mulligansLeft = teams.map(() => this.setupMulligans);
    this.reportFlagged = false;
    this.reports = [];
    this.streak = 0;
    this.bestStreak = 0;
    if (this.timerInterval) clearInterval(this.timerInterval);
    this.screen = 'play';
    this.render();
    this.startTimer();
  }

  renderPlay() {
    const q = this.questions[this.qIndex];
    const total = this.questions.length;
    const team = this.config.teams[this.currentTeam];
    const tColor = this.timeLeft <= 3 ? '#ef4444' : this.timeLeft <= 7 ? '#f59e0b' : '#818cf8';
    const pct = (this.timeLeft / this.config.timerLength) * 100;
    const hasDifficulty = this.hasDifficulty;
    const dLabel = hasDifficulty ? (DIFF_LABELS[q[3]] || '') : '';
    const dColor = hasDifficulty ? (DIFF_COLORS[q[3]] || '#94a3b8') : '#94a3b8';
    const hasPoints = q.length > 4 && q[4] > 0;

    const scoresHtml = this.config.teams.map((t,i) =>
      `<span class="${this.currentTeam===i?'score-active':'score-dim'}">${escapeHtml(t.name)}: ${this.scores[i].toLocaleString()}</span>`
    ).join('&nbsp;&nbsp;');

    const mulligansRemaining = this.mulligansLeft[this.currentTeam];
    const hasMulligans = mulligansRemaining > 0 && this.reservePool.length > 0;

    let centerHtml = '';
    if (this.phase === 'timing') {
      centerHtml = `
        <div style="margin-bottom:20px;text-align:center">
          <div class="timer-num" style="color:${this.paused ? '#64748b' : tColor}">${this.paused ? '&#9646;&#9646;' : this.timeLeft}</div>
          <div class="timer-bar"><div class="timer-fill" style="width:${pct}%;background:${this.paused ? '#64748b' : tColor}"></div></div>
        </div>
        <div style="display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap">
          <button id="pause-btn" style="padding:12px 28px;border-radius:10px;background:${this.paused ? 'rgba(245,158,11,0.12)' : 'rgba(100,116,139,0.12)'};border:2px solid ${this.paused ? '#f59e0b' : '#475569'};color:${this.paused ? '#f59e0b' : '#94a3b8'};font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">${this.paused ? '&#9654; Resume' : '&#9646;&#9646; Pause'}</button>
          ${!this.paused ? '<button id="got-it-btn" style="padding:12px 36px;border-radius:10px;background:rgba(129,140,248,0.12);border:2px solid #818cf8;color:#a5b4fc;font-size:16px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;letter-spacing:0.5px">Reveal</button>' : ''}
          ${!this.paused && hasMulligans ? `<button id="mulligan-btn" style="padding:12px 24px;border-radius:10px;background:rgba(168,85,247,0.12);border:2px solid #a855f7;color:#c084fc;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Mulligan (${mulligansRemaining})</button>` : ''}
        </div>`;
    }

    let answerHtml = '';
    if (this.phase === 'revealed') {
      answerHtml = `
        <div class="answer-reveal" style="width:100%;margin-bottom:24px">
          <div class="answer-label">Answer</div>
          <div class="answer-text">${escapeHtml(q[1])}</div>
        </div>
        <div style="display:flex;gap:10px;width:100%;justify-content:center;flex-wrap:wrap;align-items:center">
          <button class="btn-correct" data-answer="correct">&#10003; Correct</button>
          <button class="btn-incorrect" data-answer="incorrect">&#10007; Incorrect</button>
          <button id="report-flag" style="padding:10px 16px;border-radius:10px;background:${this.reportFlagged ? 'rgba(245,158,11,0.2)' : 'rgba(100,116,139,0.08)'};border:2px solid ${this.reportFlagged ? '#f59e0b' : '#334155'};color:${this.reportFlagged ? '#f59e0b' : '#64748b'};font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s" title="Flag this question for review">&#9873; ${this.reportFlagged ? 'Flagged' : 'Report'}</button>
        </div>`;
    }

    this.el.innerHTML = `
      <div class="screen" style="background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;flex-direction:column">
        <div class="container" style="display:flex;flex-direction:column;flex:1">
          <div class="top-bar">
            <div>${this.qIndex+1} / ${total}</div>
            <div>${scoresHtml}</div>
            <button id="exit-btn" style="background:none;border:1px solid #475569;border-radius:6px;color:#94a3b8;padding:4px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">Exit</button>
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${(this.qIndex/total)*100}%"></div></div>

          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
            ${this.config.mode === 'team' ? `<div class="team-turn">${escapeHtml(team.name)}'s Turn</div>` : ''}
            <div style="text-align:center;margin-bottom:16px${this.paused ? ';opacity:0' : ''}">
              <div class="q-category">${escapeHtml(q[2])}${q.length > 5 && q[5] && q[5] !== q[2] ? ' <span style="opacity:0.5;font-size:11px">(' + escapeHtml(q[5]) + ')</span>' : ''}</div>
              ${hasDifficulty || hasPoints ? `<div class="q-meta">
                ${hasDifficulty ? `<span style="color:${dColor}">${dLabel}</span>` : ''}
                ${hasPoints ? `<span>$${q[4]}</span>` : ''}
              </div>` : ''}
            </div>

            ${this.phase === 'timing' ? centerHtml : ''}

            <div class="q-card" style="width:100%;margin-bottom:24px">
              ${this.paused
                ? '<p style="font-size:16px;color:#64748b;font-style:italic">Game paused</p>'
                : `<p class="q-text">${escapeHtml(q[0])}</p>`
              }
              
            </div>

            ${answerHtml}

            ${this.config.mode === 'solo' && this.streak > 1 ? `<div class="streak-badge">&#128293; ${this.streak} streak</div>` : ''}
          </div>
        </div>
      </div>`;

    // Events
    const gotItBtn = document.getElementById('got-it-btn');
    if (gotItBtn) gotItBtn.onclick = () => { clearInterval(this.timerInterval); this.phase = 'revealed'; this.render(); };
    const pauseBtn = document.getElementById('pause-btn');
    if (pauseBtn) pauseBtn.onclick = () => {
      if (this.paused) {
        this.paused = false;
        this.timerInterval = setInterval(() => {
          this.timeLeft--;
          if (this.timeLeft <= 0) { clearInterval(this.timerInterval); this.phase = 'revealed'; }
          this.render();
        }, 1000);
      } else {
        this.paused = true;
        clearInterval(this.timerInterval);
      }
      this.render();
    };
    const exitBtn = document.getElementById('exit-btn');
    if (exitBtn) exitBtn.onclick = () => {
      clearInterval(this.timerInterval);
      this.results = {
        teams: this.config.teams,
        scores: [...this.scores],
        correct: [...this.correct],
        incorrect: [...this.incorrect],
        reports: [...this.reports],
        mulligansUsed: this.mulligansLeft.map((left) => this.config.mulligansPerTeam - left),
        bestStreak: this.bestStreak,
        totalQuestions: this.qIndex,
      };
      this.screen = 'summary';
      this.render();
    };
    const mulliganBtn = document.getElementById('mulligan-btn');
    if (mulliganBtn) mulliganBtn.onclick = () => {
      if (this.mulligansLeft[this.currentTeam] > 0 && this.reservePool.length > 0) {
        clearInterval(this.timerInterval);
        this.mulligansLeft[this.currentTeam]--;
        const replacement = this.reservePool.shift();
        this.questions[this.qIndex] = replacement;
        this.timeLeft = this.config.timerLength;
        this.paused = false;
        this.phase = 'timing';
        this.render();
        this.startTimer();
      }
    };
    this.el.querySelectorAll('[data-answer]').forEach(btn => {
      btn.onclick = () => this.handleAnswer(btn.dataset.answer);
    });
    const reportFlag = document.getElementById('report-flag');
    if (reportFlag) reportFlag.onclick = () => {
      this.reportFlagged = !this.reportFlagged;
      this.render();
    };
  }

  startTimer() {
    this.timeLeft = this.config.timerLength;
    this.phase = 'timing';
    this.paused = false;
    if (this.timerInterval) clearInterval(this.timerInterval);
    this.timerInterval = setInterval(() => {
      this.timeLeft--;
      if (this.timeLeft <= 0) {
        clearInterval(this.timerInterval);
        this.phase = 'revealed';
      }
      this.render();
    }, 1000);
  }

  handleAnswer(result) {
    const q = this.questions[this.qIndex];
    const ti = this.currentTeam;

    if (result === 'correct') {
      this.scores[ti] += (q.length > 4 && q[4] > 0) ? q[4] : 1;
      this.correct[ti]++;
      this.streak++;
      if (this.streak > this.bestStreak) this.bestStreak = this.streak;
    } else if (result === 'incorrect') {
      this.incorrect[ti]++;
      this.streak = 0;
    }

    // Log report if flagged
    if (this.reportFlagged) {
      const report = {
        question: q[0],
        answer: q[1],
        category: q[2],
        subcategory: q[5] || '',
        markedAs: result,
        date: new Date().toLocaleDateString(),
        questionSet: this.activeSetName || 'Unknown',
      };
      this.reports.push(report);
      this.allReports.push(report);
      this._saveReports();
      this.reportFlagged = false;
    }

    if (this.qIndex + 1 >= this.questions.length) {
      this.results = {
        teams: this.config.teams,
        scores: [...this.scores],
        correct: [...this.correct],
        incorrect: [...this.incorrect],
        reports: [...this.reports],
        mulligansUsed: this.mulligansLeft.map((left) => this.config.mulligansPerTeam - left),
        bestStreak: this.bestStreak,
        totalQuestions: this.questions.length,
      };
      this.screen = 'summary';
      this.render();
    } else {
      this.qIndex++;
      this.phase = 'timing';
      this.timeLeft = this.config.timerLength;
      this.paused = false;
      this.reportFlagged = false;
      if (this.config.mode === 'team') {
        this.currentTeam = (this.currentTeam + 1) % this.config.teams.length;
      }
      this.render();
      this.startTimer();
    }
  }

  renderSummary() {
    const r = this.results;
    const maxScore = Math.max(...r.scores);
    const winnerIdx = r.scores.indexOf(maxScore);
    const isTie = r.scores.filter(s => s === maxScore).length > 1;
    const isTeam = r.teams.length > 1;

    const title = isTeam
      ? (isTie ? "It's a Tie!" : `${escapeHtml(r.teams[winnerIdx].name)} Wins!`)
      : "Final Results";

    const totalAnswered = r.correct.reduce((a,b)=>a+b,0) + r.incorrect.reduce((a,b)=>a+b,0);
    const isEarlyExit = totalAnswered < r.totalQuestions;
    const headerBadge = isEarlyExit ? 'Quiz Ended Early' : 'Game Over';
    const questionsNote = isEarlyExit ? `<div style="font-size:13px;color:#64748b;margin-top:-20px;margin-bottom:24px">${totalAnswered} of ${r.totalQuestions} questions answered</div>` : '';

    const cards = r.teams.map((team, i) => {
      const answered = r.correct[i] + r.incorrect[i];
      const acc = answered > 0 ? Math.round((r.correct[i] / answered) * 100) : 0;
      const isWinner = !isTie && i === winnerIdx && isTeam;
      return `
        <div class="score-card ${isWinner ? 'winner' : ''}">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px">
            <div style="font-size:18px;font-weight:700">${isWinner ? '&#128081; ' : ''}${escapeHtml(team.name)}</div>
            <div style="font-size:28px;font-weight:700;color:#818cf8">${r.scores[i].toLocaleString()}</div>
          </div>
          <div class="stats-row">
            <span style="color:#22c55e">&#10003; ${r.correct[i]}</span>
            <span style="color:#ef4444">&#10007; ${r.incorrect[i]}</span>
            ${r.mulligansUsed && r.mulligansUsed[i] > 0 ? `<span style="color:#c084fc">&#9851; ${r.mulligansUsed[i]} mulligan${r.mulligansUsed[i]>1?'s':''}</span>` : ''}
            <span style="margin-left:auto">${acc}% accuracy</span>
          </div>
        </div>`;
    }).join('');

    const reportCount = r.reports ? r.reports.length : 0;
    const totalReportCount = this.allReports.length;
    const reportSection = reportCount > 0 ? `
      <div class="score-card" style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <span style="color:#f59e0b">&#9873; ${reportCount} question${reportCount>1?'s':''} flagged this game</span>
          ${totalReportCount > reportCount ? `<div style="font-size:11px;color:#64748b;margin-top:2px">${totalReportCount} total across all games</div>` : ''}
        </div>
        <button id="download-reports" style="background:rgba(245,158,11,0.12);border:1px solid #f59e0b;border-radius:8px;color:#f59e0b;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Download All</button>
      </div>` : '';

    const soloStats = !isTeam ? `
      <div class="score-card" style="display:flex;justify-content:space-around;text-align:center;margin-top:8px">
        <div>
          <div style="font-size:24px;font-weight:700;color:#f59e0b">${r.bestStreak}</div>
          <div style="font-size:11px;color:#64748b;letter-spacing:1px;text-transform:uppercase">Best Streak</div>
        </div>
        <div>
          <div style="font-size:24px;font-weight:700;color:#818cf8">${r.totalQuestions}</div>
          <div style="font-size:11px;color:#64748b;letter-spacing:1px;text-transform:uppercase">Questions</div>
        </div>
      </div>` : '';

    this.el.innerHTML = `
      <div class="screen" style="background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;flex-direction:column;align-items:center">
        <div class="container" style="padding-top:40px">
          <div class="summary-badge">${headerBadge}</div>
          <h2 class="summary-title">${title}</h2>
          ${questionsNote}
          ${cards}
          ${soloStats}
          ${reportSection}
          <div style="display:flex;gap:12px;margin-top:32px">
            <button class="btn-primary" style="flex:1" id="play-again">Play Again</button>
            <button style="flex:1;padding:14px;border-radius:12px;background:#1e293b;color:#94a3b8;border:1px solid #334155;font-size:16px;font-weight:600" id="new-setup">New Setup</button>
          </div>
        </div>
      </div>`;

    const dlBtn = document.getElementById('download-reports');
    if (dlBtn) dlBtn.onclick = () => this._downloadReports();

    document.getElementById('play-again').onclick = () => {
      let avail = this.setupAllCats
        ? this.data.q.length
        : this.data.q.filter(q => this.setupSelectedCats.has(q[2])).length;
      if (this.setupDifficulties && this.setupDifficulties.size > 0) {
        const diffs = new Set([...this.setupDifficulties].map(Number));
        avail = this.data.q.filter(q => 
          (this.setupAllCats || this.setupSelectedCats.has(q[2])) && diffs.has(q[3])
        ).length;
      }
      this.startGame(avail);
    };
    document.getElementById('new-setup').onclick = () => { this.screen = 'setup'; this.render(); };
  }
}

new TriviaApp();
</script>
</body>
</html>
